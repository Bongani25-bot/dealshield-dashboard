<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DealShield Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background-color: #f5f5f5; color: #333; }
    h1, h2, h3 { color: #1a73e8; }
    #crypto-prices, #subscribe { background: #fff; padding: 15px; margin: 15px 0; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    ul { list-style-type: none; padding-left: 0; }
    li { margin: 5px 0; }
    input { padding: 8px; width: calc(100% - 16px); margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc; }
    button { padding: 10px 20px; background: #1a73e8; color: white; border: none; border-radius: 5px; cursor: pointer; }
    button:hover { background: #1558b0; }
  </style>
</head>
<body>

  <h1>DealShield Dashboard</h1>
  <p>Monitor crypto prices and get Telegram alerts automatically!</p>

  <!-- Live Crypto Prices -->
  <div id="crypto-prices">
    <h2>Live Crypto Prices</h2>
    <ul id="prices-list">
      <!-- Prices will appear here -->
    </ul>
  </div>

  <!-- Subscribe to Telegram Alerts -->
  <div id="subscribe">
    <h3>Get Alerts on Telegram</h3>
    <input type="text" id="chatId" placeholder="Enter your Telegram Chat ID">
    <button onclick="sendTelegramAlert()">Subscribe</button>
  </div>

  <script>
    const cryptoList = ["bitcoin","ethereum","solana","dogecoin"];

    // Fetch live crypto prices
    async function fetchCryptoPrices() {
      try {
        const url = `https://api.coingecko.com/api/v3/simple/price?ids=${cryptoList.join(",")}&vs_currencies=usd`;
        const resp = await fetch(url);
        const data = await resp.json();
        const ul = document.getElementById("prices-list");
        ul.innerHTML = "";
        for (let coin of cryptoList) {
          const li = document.createElement("li");
          li.textContent = `${coin.toUpperCase()}: $${data[coin].usd}`;
          ul.appendChild(li);

          // Example signal: Bitcoin > $50,000 triggers Telegram
          if (coin === "bitcoin" && data[coin].usd > 50000) {
            sendTelegramMessage(`🚨 Bitcoin is above $50,000: $${data[coin].usd}`);
          }
        }
      } catch (err) {
        console.error("Error fetching crypto prices:", err);
      }
    }

    // Send message via Telegram Bot API
    function sendTelegramMessage(msg) {
      const botToken = "YOUR_BOT_TOKEN"; // <-- Replace with your Telegram bot token
      const chatId = document.getElementById("chatId").value;
      if (!chatId) return;
      fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ chat_id: chatId, text: msg })
      }).catch(err => console.error("Telegram error:", err));
    }

    // Subscribe button action
    function sendTelegramAlert() {
      const chatId = document.getElementById("chatId").value;
      if (!chatId) {
        alert("Enter your Telegram Chat ID!");
        return;
      }
      sendTelegramMessage("✅ You are now subscribed to DealShield alerts!");
      alert("Subscription successful! You will now receive Telegram alerts.");
    }

    // Auto-refresh every 30 seconds
    setInterval(fetchCryptoPrices, 30000);
    fetchCryptoPrices();
  </script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>DealShield Terminal V3</title>

<style>

body{
background:#050505;
color:white;
font-family:Arial;
margin:0;
}

header{
background:#0f172a;
padding:20px;
text-align:center;
}

header h1{
color:#38bdf8;
}

.logo{
margin-top:10px;
}

.navbar{
display:flex;
justify-content:center;
flex-wrap:wrap;
background:#111827;
padding:10px;
}

.navbar button{
background:#1f2937;
border:none;
color:white;
padding:10px 15px;
margin:5px;
border-radius:6px;
cursor:pointer;
}

.navbar button:hover{
background:#38bdf8;
}

.page{
display:none;
padding:20px;
}

.card{
background:#111827;
padding:20px;
margin:10px;
border-radius:10px;
}

.tp{color:#22c55e;}
.sl{color:#ef4444;}

</style>

</head>

<body>

<header>

<h1>DealShield Trading Terminal V3</h1>

<!-- PUT YOUR LOGO FILE NAME BELOW -->

<img src="DealshealdAI-Bot logo.jpg" height="60" class="logo">

</header>


<div class="navbar">

<button onclick="showPage('home')">Home</button>
<button onclick="showPage('signals')">Signals</button>
<button onclick="showPage('markets')">Markets</button>
<button onclick="showPage('whales')">Whale Tracker</button>
<button onclick="showPage('subscribe')">Subscription</button>

</div>


<!-- HOME PAGE -->

<div id="home" class="page">

<div class="card">

<h3>BTC / USD</h3>

<p id="btcPrice">Loading...</p>

</div>

<div class="card">

<h3>GOLD / USD</h3>

<p>Live Gold Data</p>

</div>

<div class="card">

<h3>USD / JPY</h3>

<p>Forex Pair</p>

</div>

</div>


<!-- SIGNALS -->

<div id="signals" class="page">

<div class="card">

<h3>Gold Signal</h3>

ENTRY 5070.770

<br>

TP <span class="tp">5075.000</span>

<br>

SL <span class="sl">5068.507</span>

</div>

</div>


<!-- MARKETS -->

<div id="markets" class="page">

<div class="card">

<h3>Live Markets</h3>

<p>BTC, Gold, Forex prices</p>

</div>

</div>


<!-- WHALE TRACKER -->

<div id="whales" class="page">

<div class="card">

<h3>Whale Activity</h3>

<p>Large BTC movement detected</p>

</div>

</div>


<!-- SUBSCRIPTION -->

<div id="subscribe" class="page">

<div class="card">

<h3>Subscription</h3>

<a href="https://www.paypal.com/ncp/payment/YMH9HJK3EN526">PayPal Direct</a>

<br><br>

<a href="https://www.paypal.com/ncp/payment/E7UWDMK9ZE8Z4">PayPal Checkout</a>

</div>

</div>


<script>

function showPage(page){

let pages=document.querySelectorAll(".page")

pages.forEach(p => p.style.display="none")

document.getElementById(page).style.display="block"

}

showPage("home")

async function loadBTC(){

const r=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd")

const data=await r.json()

document.getElementById("btcPrice").innerText="$"+data.bitcoin.usd

}

loadBTC()

setInterval(loadBTC,30000)

</script>

</body>

  </html>

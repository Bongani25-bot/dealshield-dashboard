<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DealShield Elite Intelligence</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- PAYPAL -->
<script src="https://www.paypal.com/sdk/js?client-id=ARF6hlAqtQpeku8fTRadY_bgYKr2GdxntEybk82nj4Yg7L4OkFRwHVJDBq9kcDN93CHRbDaq54OEgP6j&currency=USD"></script>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

header{
background:linear-gradient(90deg,#1a73e8,#ffd700);
padding:20px;
text-align:center;
}

header img{
height:70px;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.coin-cards{
display:flex;
flex-wrap:wrap;
gap:15px;
justify-content:center;
}

.card{
padding:15px;
border-radius:15px;
width:220px;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 15px 40px rgba(0,0,0,0.8);
}

.green{
background:linear-gradient(145deg,#28a745,#145a32);
}

.red{
background:linear-gradient(145deg,#dc3545,#641e16);
}

#charts{
display:flex;
flex-wrap:wrap;
gap:20px;
margin-top:30px;
}

canvas{
background:#111;
border-radius:15px;
padding:10px;
}

.panel{
background:#111;
padding:20px;
border-radius:15px;
margin-top:25px;
box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

#paypal-button-container{
margin-top:20px;
}

.whale{
color:#00eaff;
font-weight:bold;
}

.ai{
color:#ffd700;
font-weight:bold;
}

</style>
</head>

<body>

<header>
<img src="DealshealdAI-Bot logo.jpg">
<h1>DealShield Elite Intelligence</h1>
<p>Crypto Monitoring • Whale Tracking • AI Predictions</p>
</header>

<div class="container">

<h2>Market Monitor</h2>
<div id="coins" class="coin-cards"></div>

<div id="charts"></div>

<div class="panel">
<h2>🐋 Whale Tracker</h2>
<div id="whales"></div>
</div>

<div class="panel">
<h2>🧠 DealShield AI Prediction</h2>
<div id="ai"></div>
</div>

<div class="panel">
<h2>Premium Signals</h2>
<p>$5/month subscription unlocks elite alerts</p>
<div id="paypal-button-container"></div>
</div>

</div>

<script>

const botToken="8532925950:AAGaNZVOXFMjx8EU3Pm-OR69WcNUFeeElD4";

const chats=[
"8519623109",
"-1003766072650"
]

function sendTelegram(msg){

chats.forEach(id=>{

fetch(`https://api.telegram.org/bot${botToken}/sendMessage`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

chat_id:id,
text:msg

})

})

})

}

const coins=["bitcoin","ethereum","solana","dogecoin"]

async function loadPrices(){

const r=await fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${coins.join(",")}&sparkline=true`)

const data=await r.json()

let html=""

data.forEach(c=>{

let change=c.price_change_percentage_24h

let cls=change>0?"green":"red"

html+=`

<div class="card ${cls}">
<h3>${c.name}</h3>
<h2>$${c.current_price}</h2>
<p>${change.toFixed(2)}%</p>
</div>

`

})

document.getElementById("coins").innerHTML=html

}

function whaleTracker(){

const alerts=[

"🐋 1,200 BTC moved to exchange",
"🐋 850 ETH transferred to cold wallet",
"🐋 $12M USDT minted",
"🐋 SOL whale buy $8M"

]

let html=""

alerts.forEach(a=>{

html+=`<p class="whale">${a}</p>`

sendTelegram(a)

})

document.getElementById("whales").innerHTML=html

}

function aiPrediction(){

const signals=[

"BTC: Bullish breakout forming",
"ETH: Neutral consolidation",
"SOL: Bullish momentum",
"DOGE: High volatility"

]

let html=""

signals.forEach(s=>{

html+=`<p class="ai">${s}</p>`

})

document.getElementById("ai").innerHTML=html

}

paypal.Buttons({

style:{

color:"gold",
shape:"rect",
label:"subscribe"

},

createOrder:function(data,actions){

return actions.order.create({

purchase_units:[{

amount:{
value:"5"
}

}]

})

},

onApprove:function(data,actions){

alert("Subscription successful")

}

}).render("#paypal-button-container")

loadPrices()

whaleTracker()

aiPrediction()

setInterval(loadPrices,300000)

</script>

</body>
</html>

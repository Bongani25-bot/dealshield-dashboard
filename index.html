<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DealShield AI Terminal</title>

<style>
body{
    background:#050505;
    color:white;
    font-family:Arial;
    margin:0;
}
header{
    background:#0f172a;
    padding:15px;
    text-align:center;
}
header h1{
    color:#38bdf8;
}
.logo{
    height:60px;
    margin-top:10px;
}
.navbar{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    background:#111827;
}
.navbar button{
    margin:5px;
    padding:10px;
    background:#1f2937;
    border:none;
    color:white;
    border-radius:6px;
}
.page{display:none; padding:15px;}
.card{
    background:#111827;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
}
a{
    color:#38bdf8;
    text-decoration:none;
}
</style>
</head>

<body>

<header>
<h1>DealShield AI</h1>
<img src="DealshealdAI-Bot logo.jpg" class="logo">
</header>

<div class="navbar">
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('signals')">Signals</button>
<button onclick="showPage('markets')">Markets</button>
<button onclick="showPage('socials')">Socials</button>
<button onclick="showPage('subscribe')">Subscribe</button>
</div>

<!-- HOME -->
<div id="home" class="page">
<div class="card">
<h3>BTC</h3>
<p id="btcPrice">Loading...</p>
</div>
<div class="card">
<h3>Gold</h3>
<p id="goldPrice">Loading...</p>
</div>
</div>

<!-- SIGNALS -->
<div id="signals" class="page">
<div class="card">
<h3>Live Signals (Telegram)</h3>
<ul id="signalFeed">
<li>Waiting for live signals...</li>
</ul>
</div>
</div>

<!-- MARKETS -->
<div id="markets" class="page">
<div class="card">
<h3>Ethereum</h3>
<p id="ethMarket"></p>
</div>
<div class="card">
<h3>Solana</h3>
<p id="solMarket"></p>
</div>
</div>

<!-- SOCIAL MEDIA -->
<div id="socials" class="page">
<div class="card">
<h3>Connect With DealShield</h3>

<p><a href="https://tiktok.com/@dealshield.ai" target="_blank">TikTok</a></p>

<p><a href="https://instagram.com/dealshield.ai" target="_blank">Instagram</a></p>

<p><a href="https://facebook.com/dealshield.ai" target="_blank">Facebook</a></p>

<p><a href="https://linkedin.com" target="_blank">LinkedIn</a></p>

</div>
</div>

<!-- SUBSCRIBE -->
<div id="subscribe" class="page">
<div class="card">
<h3>Subscribe</h3>

<p><a href="https://www.paypal.com/ncp/payment/YMH9HJK3EN526">PayPal</a></p>

<p>Crypto Wallet:</p>
<p>Cu7HrDpqS7JAgBXc5hJrzEwY4JQECdtmTZA6aZFXTHdK</p>

</div>
</div>

<script>

function showPage(page){
document.querySelectorAll(".page").forEach(p=>p.style.display="none");
document.getElementById(page).style.display="block";
}
showPage("home");

// REAL API DATA
async function loadPrices(){
try{
let res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana&vs_currencies=usd");
let data = await res.json();

btcPrice.innerText="$"+data.bitcoin.usd;
ethMarket.innerText="$"+data.ethereum.usd;
solMarket.innerText="$"+data.solana.usd;

let gold = await fetch("https://www.goldapi.io/api/XAU/USD",{headers:{"x-access-token":"goldapi-1lm9hgsmmshukdf-io"}});
let g = await gold.json();
goldPrice.innerText="$"+g.price;

}catch(e){console.log(e);}
}

loadPrices();
setInterval(loadPrices,20000);

</script>

</body>
</html>

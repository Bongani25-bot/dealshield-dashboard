<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DealShield Pro Dashboard</title>

<!-- ============================================= -->
<!-- 👇 PAYPAL SDK SCRIPT - REPLACE CLIENT ID HERE -->
<!-- ============================================= -->
<script src="https://www.paypal.com/sdk/js?client-id=YOUR_PAYPAL_CLIENT_ID&currency=USD"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* ======= BASIC STYLING ======= */
body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f0f2f5; color:#333; }
header { padding:20px; text-align:center; background:#1a73e8; color:white; }
header img { height:50px; vertical-align: middle; margin-right:10px; }
header h1 { display:inline; margin:0; }
header p { margin:5px 0 0 0; }
.container { padding:20px; max-width:1200px; margin:auto; }
.coin-cards { display:flex; flex-wrap:wrap; gap:15px; justify-content:center; }
.card { background:white; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.1); padding:15px; flex:1 1 200px; max-width:250px; transition: transform 0.3s; position:relative; }
.card:hover { transform:translateY(-5px); }
.coin-logo { width:30px; vertical-align:middle; margin-right:8px; }
.price { font-size:1.2em; margin:5px 0; }
.change { font-weight:bold; }
.green { color:#28a745; }
.red { color:#dc3545; }
#charts { display:flex; flex-wrap:wrap; gap:15px; justify-content:center; margin-top:30px; }
canvas { background:white; border-radius:10px; padding:10px; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
#toggle-theme { position:fixed; top:20px; right:20px; background:#fff; border:1px solid #ccc; border-radius:20px; padding:5px 10px; cursor:pointer; }
.top-movers { margin-top:20px; text-align:center; font-weight:bold; }
#premium-subscription { text-align:center; margin:30px 0; }
#premium-subscription h2 { margin-bottom:5px; }
</style>
</head>
<body>

<!-- ============================================= -->
<!-- 👇 HEADER SECTION - REPLACE LOGO URL HERE -->
<!-- ============================================= -->
<header>
  <img src="YOUR_LOGO_URL_HERE" alt="DealShield Logo">
  <h1>DealShield Pro</h1>
  <p>Live Crypto Prices & Telegram Alerts</p>
</header>

<div id="toggle-theme" onclick="toggleTheme()">Dark Mode</div>

<div class="container">

  <!-- ============================================= -->
  <!-- 👇 COIN CARDS -->
  <!-- ============================================= -->
  <div class="coin-cards" id="coin-cards"></div>

  <!-- ============================================= -->
  <!-- 👇 TOP 3 GAINERS / LOSERS -->
  <!-- ============================================= -->
  <div class="top-movers" id="top-movers">Top mover: --</div>

  <!-- ============================================= -->
  <!-- 👇 CHARTS SECTION -->
  <!-- ============================================= -->
  <div id="charts"></div>

  <!-- ============================================= -->
  <!-- 👇 PREMIUM SUBSCRIPTION SECTION - PAYPAL BUTTON -->
  <!-- ============================================= -->
  <div id="premium-subscription">
    <h2>Unlock Premium Alerts</h2>
    <p>Get advanced signals and instant Telegram alerts.</p>
    <div id="paypal-button-container"></div>
  </div>

</div>

<script>
// =============================================
// 👇 TELEGRAM CONFIGURATION - REPLACE IF NEEDED
// =============================================
const botToken = "8532925950:AAGaNZVOXFMjx8EU3Pm-OR69WcNUFeeElD4";
const chatIds = ["8519623109", "-1003766072650"]; // private and group

function sendTelegramMessage(msg) {
  chatIds.forEach(chatId => {
    fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
      method:"POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({chat_id: chatId, text: msg})
    }).catch(err=>console.error("Telegram error:", err));
  });
}

// =============================================
// 👇 CRYPTO DATA CONFIG
// =============================================
const cryptoList = ["bitcoin","ethereum","solana","dogecoin"];
const coinNames = {bitcoin:"Bitcoin", ethereum:"Ethereum", solana:"Solana", dogecoin:"Dogecoin"};
const coinLogos = {
  bitcoin:"https://assets.coingecko.com/coins/images/1/large/bitcoin.png",
  ethereum:"https://assets.coingecko.com/coins/images/279/large/ethereum.png",
  solana:"https://assets.coingecko.com/coins/images/4128/large/solana.png",
  dogecoin:"https://assets.coingecko.com/coins/images/5/large/dogecoin.png"
};

let charts = {};
let lastPrices = {};

async function fetchCryptoData() {
  try {
    const url = `https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${cryptoList.join(",")}&order=market_cap_desc&per_page=10&page=1&sparkline=true`;
    const resp = await fetch(url);
    const data = await resp.json();

    const cardsContainer = document.getElementById("coin-cards");
    cardsContainer.innerHTML = "";
    let topMover = {coin:"", change:0};

    data.forEach(coin => {
      if(Math.abs(coin.price_change_percentage_24h) > Math.abs(topMover.change)){
        topMover.coin = coin.id;
        topMover.change = coin.price_change_percentage_24h;
      }

      const card = document.createElement("div");
      card.className="card";
      card.title=`Market Cap: $${coin.market_cap.toLocaleString()}, Volume: $${coin.total_volume.toLocaleString()}`;
      card.innerHTML=`
        <h3><img class="coin-logo" src="${coinLogos[coin.id]}" /> ${coinNames[coin.id]}</h3>
        <div class="price">$${coin.current_price.toLocaleString()}</div>
        <div class="change ${coin.price_change_percentage_24h>=0?"green":"red"}">
          ${coin.price_change_percentage_24h.toFixed(2)}%
        </div>
      `;
      cardsContainer.appendChild(card);

      // Charts
      if(!charts[coin.id]){
        const canvas=document.createElement("canvas");
        canvas.id=`${coin.id}-chart`;
        canvas.width=300;
        canvas.height=150;
        document.getElementById("charts").appendChild(canvas);
        charts[coin.id]=new Chart(canvas.getContext('2d'),{
          type:'line',
          data:{labels:Array(coin.sparkline_in_7d.price.length).fill(""), datasets:[{label:coinNames[coin.id], data:coin.sparkline_in_7d.price, borderColor:'#1a73e8', fill:false}]},
          options:{responsive:true, plugins:{legend:{display:false}}, scales:{x:{display:false},y:{display:true}}}
        });
      }else{
        charts[coin.id].data.datasets[0].data=coin.sparkline_in_7d.price;
        charts[coin.id].update();
      }

      // Example alert: Bitcoin > 50k
      if(coin.id==="bitcoin" && coin.current_price>50000){
        sendTelegramMessage(`🚨 Bitcoin is above $50,000: $${coin.current_price}`);
      }
    });

    document.getElementById("top-movers").textContent=`Top mover: ${coinNames[topMover.coin]} ${topMover.change>=0?"+":""}${topMover.change.toFixed(2)}%`;

  }catch(err){ console.error("Error fetching crypto data:", err); }
}

// =============================================
// 👇 DARK MODE TOGGLE
// =============================================
let darkMode=false;
function toggleTheme(){
  darkMode=!darkMode;
  document.body.style.background=darkMode?"#1c1c1c":"#f0f2f5";
  document.body.style.color=darkMode?"#eee":"#333";
  document.querySelectorAll(".card, canvas").forEach(el=>el.style.background=darkMode?"#2c2c2c":"#fff");
  document.getElementById("toggle-theme").textContent=darkMode?"Light Mode":"Dark Mode";
}

// =============================================
// 👇 INIT FETCH
// =============================================
setInterval(fetchCryptoData,30000);
fetchCryptoData();

// =============================================
// 👇 PAYPAL BUTTONS - REPLACE PLAN ID HERE
// =============================================
paypal.Buttons({
  style:{shape:'rect', color:'blue', layout:'vertical', label:'subscribe'},
  createSubscription:function(data,actions){
    // 👇 REPLACE WITH YOUR PAYPAL PLAN ID
    return actions.subscription.create({ plan_id:'YOUR_PAYPAL_PLAN_ID' }); 
  },
  onApprove:function(data,actions){ 
    alert('Thank you for subscribing! You will now get premium alerts.'); 
  }
}).render('#paypal-button-container');

</script>
</body>
</html>

button.subscribe {

.neon { color:#00ffff; text-shadow:0 0 5px #00ffff,0 0 10px #00ffff; }

.panel ul { max-height:200px; overflow-y:auto; }

<script>

// ======================
// TELEGRAM FUNCTION
// ======================
function sendTelegram(message){
  telegramChatIDs.forEach(chatID=>{
    fetch(`https://api.telegram.org/bot${telegramBotToken}/sendMessage`,{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({chat_id:chatID,text:message})
    }).catch(err=>console.error("Telegram error:",err));
  });
}

// ======================
// MULTI-COIN & GOLD PRICES
// ======================
async function updateMultiCoinPrices(){
  try{
    const coins = ["bitcoin","ethereum","solana","binancecoin","cardano","dogecoin","ripple"];
    const coinRes = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${coins.join(',')}&vs_currencies=usd`);
    const coinData = await coinRes.json();

    const goldRes = await fetch("https://www.goldapi.io/api/XAU/USD",{
      method:"GET",
      headers:{ "x-access-token":goldApiKey, "Content-Type":"application/json" }
    });
    const goldData = await goldRes.json();
    const goldPrice = goldData.price;

    const list = document.getElementById("multiCoinPrices");
    list.innerHTML="";
    coins.forEach(c=>{
      const li = document.createElement("li");
      li.textContent=`${c.toUpperCase()}: $${coinData[c].usd}`;
      list.appendChild(li);
    });

    const liGold = document.createElement("li");
    liGold.textContent=`GOLD (XAU/USD): $${goldPrice}`;
    list.appendChild(liGold);

  }catch(err){ console.error("Price fetch error:",err); }
}
updateMultiCoinPrices();
setInterval(updateMultiCoinPrices,300000);

// AI SIGNAL ENGINE
// ======================
async function aiSignalEngine(){
  try{
    const btc=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd");
    const eth=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=ethereum&vs_currencies=usd");
    const sol=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=solana&vs_currencies=usd");
    const btcPrice=(await btc.json()).bitcoin.usd;
    const ethPrice=(await eth.json()).ethereum.usd;
    const solPrice=(await sol.json()).solana.usd;

    const signals=[];
    signals.push(btcPrice>65000?"🚨 BTC bullish momentum detected":"⚠️ BTC consolidation zone");
    signals.push(ethPrice>3000?"📈 ETH upward trend forming":"📉 ETH weak momentum");
    signals.push(solPrice>120?"🔥 SOL breakout potential":"🔍 SOL accumulation zone");

    const list=document.getElementById("signals");
    list.innerHTML="";
    signals.forEach(s=>{
      const li=document.createElement("li");
      li.textContent=s; list.appendChild(li);
      sendTelegram("🧠 AI Signal Alert: "+s);
    });

  }catch(err){ console.error("AI Engine error:",err); }
}
aiSignalEngine();
